name: dineqr
description: DineQR - Scan • Order • Enjoy. A premium QR-based restaurant ordering app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.0

  # QR Scanning
  mobile_scanner: ^4.0.1

  # Images
  cached_network_image: ^3.3.1

  # Animations
  lottie: ^3.1.0
  flutter_animate: ^4.5.0

  # Realtime (Django Channels WebSocket)
  web_socket_channel: ^2.4.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_slidable: ^3.0.1
  smooth_page_indicator: ^1.1.0

  # Payments
  flutter_stripe: ^10.1.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  uuid: ^4.2.2

  # Icons
  cupertino_icons: ^1.0.6
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/dineqr_logo.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/dineqr_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

