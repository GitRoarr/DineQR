version: '3.8'

services:
  # Django Backend (with Daphne for WebSocket support)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dineqr_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - SECRET_KEY=${SECRET_KEY:-dineqr-super-secret-key-change-in-production}
      - DEBUG=${DEBUG:-False}
      - DATABASE_URL=postgres://dineqr:dineqr_password@db:5432/dineqr_db
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=*
    volumes:
      - backend_media:/app/media
      - backend_static:/app/static
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput 2>/dev/null;
        daphne -b 0.0.0.0 -p 8000 backend.asgi:application
      "

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: dineqr_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=dineqr_db
      - POSTGRES_USER=dineqr
      - POSTGRES_PASSWORD=dineqr_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dineqr -d dineqr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for Django Channels)
  redis:
    image: redis:7-alpine
    container_name: dineqr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Flutter Frontend (for development)
  flutter:
    image: cirrusci/flutter:stable
    container_name: dineqr_flutter
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: flutter pub get
    profiles:
      - dev

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: dineqr_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - backend_media:/app/media
      - backend_static:/app/static
      - flutter_web:/app/flutter_web
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_media:
  backend_static:
  flutter_web:
