version: '3.9'

services:
  # Django Backend (with Daphne for WebSocket support)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dineqr_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
    volumes:
      - backend_media:/app/media
      - backend_static:/app/static
    depends_on:
      redis:
        condition: service_started
    command: >
      sh -c "
        python manage.py wait_for_db &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput 2>/dev/null;
        daphne -b 0.0.0.0 -p 8000 backend.asgi:application
      "

  # Redis (for Django Channels)
  redis:
    image: redis:7-alpine
    container_name: dineqr_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  # Flutter Frontend (for development)
  flutter:
    image: ghcr.io/cirruslabs/flutter:stable
    container_name: dineqr_flutter
    working_dir: /app
    ports:
      - "8081:8081"
    volumes:
      - ./frontend:/app
    stdin_open: true
    tty: true
    profiles:
      - dev

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: dineqr_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - backend_media:/app/media
      - backend_static:/app/static
      - flutter_web:/app/flutter_web
    depends_on:
      - backend

volumes:
  backend_media:
  backend_static:
  redis_data:
  flutter_web: